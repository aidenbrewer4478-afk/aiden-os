<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Connecting WHOOP — AidenOS</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Space+Grotesk:wght@400;600;700&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:#07070e;display:flex;align-items:center;justify-content:center;font-family:'Space Grotesk',sans-serif}
.wrap{text-align:center;padding:40px;max-width:400px}
.logo-mark{width:56px;height:56px;border-radius:16px;background:rgba(0,229,255,0.1);border:2px solid #00e5ff;display:flex;align-items:center;justify-content:center;font-family:'Space Mono',monospace;font-size:22px;font-weight:700;color:#00e5ff;margin:0 auto 24px}
.title{font-size:22px;font-weight:700;color:#f0f0ff;margin-bottom:8px}
.sub{font-size:14px;color:#9898c0;margin-bottom:32px}
.spinner{width:32px;height:32px;border:3px solid #23233a;border-top-color:#00e5ff;border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto 24px}
@keyframes spin{to{transform:rotate(360deg)}}
.status{font-family:'Space Mono',monospace;font-size:12px;color:#5a5a80;letter-spacing:0.06em}
.error-box{background:#1a0a0a;border:1.5px solid #ff3d7f;border-radius:16px;padding:20px 24px;margin-top:24px;display:none;text-align:left}
.error-title{font-size:14px;font-weight:700;color:#ff3d7f;margin-bottom:6px}
.error-msg{font-size:13px;color:#9898c0;line-height:1.5;font-family:'Space Mono',monospace;word-break:break-all}
.retry-btn{margin-top:16px;padding:10px 24px;background:transparent;border:1.5px solid #00e5ff;color:#00e5ff;border-radius:99px;font-family:'Space Grotesk',sans-serif;font-size:13px;font-weight:600;cursor:pointer;width:100%}
</style>
</head>
<body>
<div class="wrap">
  <div class="logo-mark">A</div>
  <div class="title" id="title">Connecting WHOOP</div>
  <div class="sub" id="sub">Hang tight while we link your account...</div>
  <div class="spinner" id="spinner"></div>
  <div class="status" id="status">reading authorization code...</div>
  <div class="error-box" id="error-box">
    <div class="error-title">Connection failed</div>
    <div class="error-msg" id="error-msg"></div>
    <button class="retry-btn" onclick="window.location.href='/'">Back to dashboard</button>
  </div>
</div>
<script>
const SUPABASE_FN = "https://rcdkqrjgdorfrwxmflxv.supabase.co/functions/v1/AidenOS"

function showError(msg) {
  document.getElementById('spinner').style.display = 'none'
  document.getElementById('status').style.display = 'none'
  document.getElementById('title').textContent = 'Connection failed'
  document.getElementById('sub').textContent = 'Something went wrong. See details below.'
  document.getElementById('error-msg').textContent = msg
  document.getElementById('error-box').style.display = 'block'
}

function setStatus(msg) {
  document.getElementById('status').textContent = msg
}

async function handleCallback() {
  const params = new URLSearchParams(window.location.search)
  const code = params.get('code')
  const error = params.get('error')
  const errorDesc = params.get('error_description')

  if (error) {
    showError('WHOOP returned an error: ' + (errorDesc || error))
    return
  }

  if (!code) {
    showError('No authorization code in URL. Full URL params: ' + window.location.search)
    return
  }

  setStatus('exchanging code for token...')

  try {
    const res = await fetch(SUPABASE_FN + '/exchange', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ code: code })
    })

    const tokens = await res.json()

    if (!tokens.access_token) {
      showError('Token exchange failed. Response: ' + JSON.stringify(tokens))
      return
    }

    setStatus('saving tokens...')
    localStorage.setItem('whoop_access_token', tokens.access_token)
    if (tokens.refresh_token) localStorage.setItem('whoop_refresh_token', tokens.refresh_token)
    localStorage.setItem('whoop_connected', 'true')

    setStatus('connected! redirecting...')
    document.getElementById('title').textContent = 'WHOOP Connected'
    document.getElementById('sub').textContent = 'Taking you back to your dashboard...'

    setTimeout(() => { window.location.href = '/' }, 1000)

  } catch(e) {
    showError('Fetch error: ' + e.message)
  }
}

handleCallback()
</script>
</body>
</html>
